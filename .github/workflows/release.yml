name: librecad-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build/release (example: v1.0.0)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: librecad-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Build source release zip
        run: python build_release.py

      - name: Build Windows portable app zip
        run: python build_windows_portable.py

      - name: Upload build artifacts (workflow run)
        uses: actions/upload-artifact@v4
        with:
          name: librecad-pdfimporter-release-assets
          path: dist/*.zip
          if-no-files-found: error

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: dist/*.zip
