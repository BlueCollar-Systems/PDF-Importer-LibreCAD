name: lc-pdfimporter-ci

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: lc-pdfimporter-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compile all Python modules
        run: |
          python -m compileall pdf2dxf.py dxf_builder.py dxf_text_builder.py dxf_import_engine.py gui.py
          python -m compileall pdfcadcore

      - name: Install ruff
        run: pip install ruff

      - name: Lint (functional + bugbear)
        run: ruff check --select F,B pdf2dxf.py dxf_builder.py dxf_text_builder.py dxf_import_engine.py gui.py pdfcadcore/

      - name: Install dependencies
        run: pip install -e . pytest

      - name: Verify pdfcadcore sync manifest
        run: python pdfcadcore_sync_check.py --skip-cross-repo

      # Corpus gate (R21-15c): token-clone pattern from FC 1a9df9f, one matrix
      # leg only. Replaces the former path-secret gate, which could never
      # resolve to a directory on hosted runners (permanent silent skip).
      # The public FreeCAD repo is cloned because the conformance runner's
      # python leg imports pdfcadcore from $BCS_FREECAD_REPO/PDFVectorImporter.
      # D-4 (round 21 deferral QS-4): the public SketchUp repo is cloned so the
      # runner's sketchup legs execute instead of visible-skipping; without
      # $BCS_SKETCHUP_REPO the runner defaults to a Windows path that never
      # exists here, and its own R4-2 skip logic handles any absence (ruby is
      # preinstalled on ubuntu runners; guarded anyway).
      - name: Optional corpus clone (CORPUS_READ_TOKEN)
        if: matrix.python-version == '3.12'
        env:
          CORPUS_READ_TOKEN: ${{ secrets.CORPUS_READ_TOKEN }}
        run: |
          if [ -z "$CORPUS_READ_TOKEN" ]; then
            echo "::notice::CORPUS_READ_TOKEN not set; corpus matrix gate visible-skip (R4-2)"
            echo "corpus_available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git clone --depth 1 "https://x-access-token:${CORPUS_READ_TOKEN}@github.com/BlueCollar-Systems/pdf-test-corpus.git" "$RUNNER_TEMP/pdf-test-corpus"
          git clone --depth 1 "https://github.com/BlueCollar-Systems/PDF-Importer-FreeCAD.git" "$RUNNER_TEMP/PDF-Importer-FreeCAD"
          echo "corpus_available=true" >> "$GITHUB_OUTPUT"
          echo "BCS_CORPUS_ROOT=$RUNNER_TEMP/pdf-test-corpus" >> "$GITHUB_ENV"
          echo "BCS_FREECAD_REPO=$RUNNER_TEMP/PDF-Importer-FreeCAD" >> "$GITHUB_ENV"
          if command -v ruby >/dev/null 2>&1; then
            ruby --version
            git clone --depth 1 "https://github.com/BlueCollar-Systems/PDF-Importer-SketchUp.git" "$RUNNER_TEMP/PDF-Importer-SketchUp"
            echo "BCS_SKETCHUP_REPO=$RUNNER_TEMP/PDF-Importer-SketchUp" >> "$GITHUB_ENV"
          else
            echo "::notice::ruby not on PATH; SketchUp conformance legs visible-skip (R4-2, D-4)"
          fi
        id: corpus

      - name: Run unit tests
        run: python -m pytest tests/ -v

      - name: Corpus schema + conformance-vector gate
        if: matrix.python-version == '3.12' && steps.corpus.outputs.corpus_available == 'true'
        run: |
          python "$BCS_CORPUS_ROOT/tools/validate_contract_schemas.py"
          python "$BCS_CORPUS_ROOT/conformance-vectors/test_conformance_vectors.py"

      - name: Verify CLI help
        run: python pdf2dxf.py --help

      - name: Preset matrix smoke test
        run: |
          python -c "
          import sys, math
          sys.path.insert(0, '.')
          from librecad_pdf_importer.importer import run_import
          import fitz, tempfile, os

          # Build a mixed-content sample PDF
          tmp = tempfile.NamedTemporaryFile(suffix='.pdf', delete=False)
          doc = fitz.open()
          p = doc.new_page(width=612, height=792)
          p.draw_line((50,50),(300,50), color=(0,0,0), width=1)
          p.draw_circle((200,400), 30, color=(1,0,0), width=0.5)
          for i in range(8):
              a = 2*math.pi*i/8
              x, y = 400+25*math.cos(a), 300+25*math.sin(a)
              p.draw_line((400,300),(x,y), color=(0,0,1), width=0.3)
          tw = fitz.TextWriter(p.rect)
          tw.append((100,700), 'BOLT 3/4\" DIA', fontsize=12)
          tw.write_text(p)
          p2 = doc.new_page(width=612, height=792)
          p2.draw_rect((50,50,560,740), color=(0,0,0), width=0.5)
          doc.save(tmp.name)
          doc.close()

          modes = ['auto', 'vector', 'raster', 'hybrid']
          errors = []
          for mode in modes:
              try:
                  r = run_import(tmp.name, mode=mode,
                                 overrides={'pages': 'all'})
                  s = r.extraction.summary()
              except Exception as e:
                  errors.append(f'{mode}: {e}')

          os.unlink(tmp.name)
          if errors:
              for e in errors: print(f'FAIL: {e}')
              sys.exit(1)
          print(f'PASS: {len(modes)} BCS-ARCH-001 modes verified')
          "

  minimum-dependencies:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up minimum supported Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install exact lower-bound runtime dependencies
        run: |
          python -m pip install "numpy==1.23.5" "matplotlib==3.7.0" "PyMuPDF==1.24.0" "ezdxf==1.1.0" "fonttools==4.50.0" pytest
          python -m pip install --no-deps -e .

      - name: Run unit tests at declared lower bounds
        run: python -m pytest tests/ -v
