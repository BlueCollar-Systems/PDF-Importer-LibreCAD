name: auto-release

on:
  push:
    branches: [main, master]
    # Docs-only pushes do not mint a release (board Q-08-a / ANS-09-1).
    # Release-pipeline workflow edits under .github/ are NOT ignored: they must
    # rebuild --latest assets. The job if: guard skips chore: bump version to
    # commits, so there is no release loop.
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "_archived/**"
      - "dist/_archived/**"
      - "dev_logs/**"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

defaults:
  run:
    shell: bash

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-release
  cancel-in-progress: false

jobs:
  release:
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version to') && !contains(github.event.head_commit.message, 'automation/version-bump') && !contains(github.event.head_commit.message, '[skip release]')"
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true
          # Default GITHUB_TOKEN authenticates checkout and tag fetch.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run release gate tests
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest
          python pdfcadcore_sync_check.py --skip-cross-repo
          python preflight_check.py
          python -m pytest tests/ -q --basetemp "$RUNNER_TEMP/pytest-librecad"

      - name: Read committed version
        id: version
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re

          cli = pathlib.Path("pdf2dxf.py")
          pyproject = pathlib.Path("pyproject.toml")

          cli_text = cli.read_text(encoding="utf-8")
          match = re.search(r'__version__\s*=\s*"(\d+\.\d+\.\d+)"', cli_text)
          if not match:
              raise SystemExit("Could not parse __version__ from pdf2dxf.py")
          version = match.group(1)

          pyproject_text = pyproject.read_text(encoding="utf-8")
          pyproject_match = re.search(r'^version\s*=\s*"(\d+\.\d+\.\d+)"', pyproject_text, re.MULTILINE)
          if not pyproject_match or pyproject_match.group(1) != version:
              got = pyproject_match.group(1) if pyproject_match else "missing"
              raise SystemExit(f"Version mismatch: cli={version} pyproject={got}")

          out = pathlib.Path(os.environ["GITHUB_OUTPUT"])
          out.write_text(f"version={version}\n", encoding="utf-8")
          PY

      - name: Set release target
        run: |
          echo "RELEASE_TARGET=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Build source zip
        run: python build_release.py

      - name: Build Windows portable zip
        run: python build_windows_portable.py

      - name: Smoke Windows portable zip
        run: python scripts/smoke_portable_zip.py "dist/LibreCAD-PDF-Importer-Windows-Portable_v*.zip"

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          TAG="v${{ steps.version.outputs.version }}"
          TITLE="v${{ steps.version.outputs.version }} — PDF to DXF Converter for LibreCAD"
          VERSION="${{ steps.version.outputs.version }}"
          PORTABLE="dist/LibreCAD-PDF-Importer-Windows-Portable_v${VERSION}.zip"
          SOURCE="dist/LibreCAD-PDF-Importer_v${VERSION}.zip"

          # Create the tag via gh (GITHUB_TOKEN), NOT `git push origin <tag>`: the
          # checkout PAT lacks `workflow` scope, so pushing a tag whose commit
          # touches .github/workflows/ is rejected. gh creates the tag through the
          # releases API, which is not subject to that restriction.
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists — re-uploading assets, not minting."
            # R21-3: stranded-release detector, warning-first (NEVER hard-fail:
            # legitimate staging like CI-only -> fix -> bump-later would go red).
            STRANDED_EXCLUDES=(
              ':(exclude)*.md'
              ':(exclude)docs/**'
              ':(exclude)tests/**'
              ':(exclude).github/**'
              ':(exclude)_archived/**'
              ':(exclude)dist/_archived/**'
              ':(exclude)dev_logs/**'
            )
            if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
              STRANDED_FILES=$(git diff --name-only "${TAG}..HEAD" -- "${STRANDED_EXCLUDES[@]}" || true)
              if [ -n "$STRANDED_FILES" ]; then
                STRANDED_COMMITS=$(git log --no-merges --format='%h %s' "${TAG}..HEAD" -- "${STRANDED_EXCLUDES[@]}" || true)
                echo "::warning::Stranded product commits past ${TAG} (release exists, nothing minted): $(echo "${STRANDED_COMMITS}" | tr '\n' ';')"
                {
                  echo "### Stranded product commits past ${TAG}"
                  echo ""
                  echo "Product files changed after tag \`${TAG}\` but this push minted no release."
                  echo "Ship them with a version-bump commit (see quick card §4.2)."
                  echo ""
                  echo '```'
                  echo "${STRANDED_COMMITS}"
                  echo '```'
                } >> "$GITHUB_STEP_SUMMARY"
              fi
            fi
            gh release upload "$TAG" "$PORTABLE" "$SOURCE" --clobber
          else
            gh release create "$TAG" --target "${RELEASE_TARGET:-$GITHUB_SHA}" --title "$TITLE" --generate-notes --latest "$PORTABLE" "$SOURCE"
          fi

      - name: Check website dispatch token secret
        id: website_dispatch_token
        env:
          WEBSITE_DISPATCH_TOKEN: ${{ secrets.WEBSITE_DISPATCH_TOKEN || secrets.BLUECOLLAR_WEBSITE_DISPATCH_TOKEN || secrets.REPO_DISPATCH_TOKEN }}
        run: |
          if [ -n "$WEBSITE_DISPATCH_TOKEN" ]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch website release update
        if: steps.website_dispatch_token.outputs.has_token == 'true'
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.WEBSITE_DISPATCH_TOKEN || secrets.BLUECOLLAR_WEBSITE_DISPATCH_TOKEN || secrets.REPO_DISPATCH_TOKEN }}
          script: |
            const tag = 'v${{ steps.version.outputs.version }}';
            const payload = {
              source_repo: context.repo.owner + '/' + context.repo.repo,
              source_event: 'auto-release',
              source_ref: context.ref,
              source_sha: context.sha,
              release_tag: tag,
              release_name: tag,
              release_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/releases/tag/${tag}`,
            };

            await github.request('POST /repos/{owner}/{repo}/dispatches', {
              owner: 'BlueCollar-Systems',
              repo: 'BlueCollar-Website',
              event_type: 'product-release',
              client_payload: payload,
            });

            core.info('Dispatched product-release to BlueCollar-Website');

      - name: Warn when website dispatch token is missing
        if: steps.website_dispatch_token.outputs.has_token != 'true'
        run: |
          echo "::warning::Skipping website dispatch because no valid dispatch token secret is configured."
          echo "Set WEBSITE_DISPATCH_TOKEN (or BLUECOLLAR_WEBSITE_DISPATCH_TOKEN / REPO_DISPATCH_TOKEN) to enable cross-repo dispatch."
